<!DOCTIPE html>
<html lang="ja">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport"
        content="width=devece-width,
        initial-scale=1.0>"
        <title>T.Tファーム|農園紹介</title>
        
        <style>
            body{
                margin:0;
                font-family:"Yu Gothic","Hiragino Sans",sans-serif;
                background:#fffaf0;
                color:#333;
            }

            header{
                background:#f6d77a;
                color:#4e342e;
                text-align:center;
                padding:22px;
            }

            header h1{
                margin:0;
                font-size:42px;
            }
            
            .logo-tt{
                font-family:'Great Vibes',cursive;
                margin-right:10px;
            }

            .logo-ja{
                font-falmily:"Yu Gothic","Hiragino Sans",sans-serif;
                font-weight:bold;
            }

            header p{
                margin:8px 0 0;
                font-size:18px;
            }

            .menu-button{
                display:none;
                position:fixed;
                top:30px;
                left:15px;
                z-index:1001;
                background:#33691E;
                color:white;
                border:none;
                font-size:28px;
                padding:8px 14px;
                cursor:pointer;
                border-radius:6px;
            }

            nav{
                background:#33691E;
                display:flex;
                justify-content:center;
                flex-wrap:wrap;
            }

            nav a{
                color:white;
                text-decoration:none;
                padding:12px 20px;
                font-weight:bold;
                border-right:1px solid
                rgba(255,255,255,0.25);
            }
            nav a:hover{
                background:#558B2F;
            }

            @media(max-width:768px){

                .menu-button{
                    display:block;
                }

                nav{
                    position:fixed;
                    top:0;
                    left:-260px;
                    width:240px;
                    height:100vh;
                    background:#33691E;
                    display:flex;
                    flex-direction:column;
                    justify-content:flex-start;
                    padding-top:70px;
                    transition:0.3s;
                    z-index:1000;
                }
               
                nav.open{
                    left:0;
                }

                nav a{
                    border-right:none;
                    border-buttom:1px solid rgba(255,255,255,0.25);
                    text-align:left;
                    padding:16px 20px;
                }
            }
            main{
                max-width:1100px;
                margin:40px auto;
                padding:20px;
            }
        
            h2{
                color:#6d8f3f;
            }
        
            .section{
                background:white;
                padding:30px;
                margin-bottom:30px;
                border-radius:12px;
                box-shadow:0 4px 10px rgba(0,0,0,0.1);
            }

            .section h2{
                color:#6d8f3f;
            }

            .section ul{
                line-height:2;
            }

            .crop-cards{
                display:grid;
                grid-template-columns:repeat(3,1fr);
                gap:20px;
                margin-top:20px;
            }

            .crop-card{
                background:white;
                border-radius:12px;
                overflow:hidden;
                box-shadow:0 4px 10px rgba(0,0,0,0.1);
            }

            .crop-card img{
                width:100%;
                height:220px;
                object-fit:cover;
            }

            .crop-card h3{
                text-align:center;
                padding:15px;
            }

            @media(max-width:900px){
                .crop-cards{
                    grid-template-columns:repeat(2,1fr);
                }
            }

            @media(max-width:600px){
                .crop-cards{
                    grid-template-columns:1fr;
                }
            }

            footer{
                background:#6d8f3f;
                color:white;
                text-align:center;
                padding:20px;
            }

            @media(max-width:768px){
                header h1{
                    font-size:30px;
                }
                
                nav a{
                    width:100%;
                    text-align:center;
                    border-bottom:1px solid
                    rgba(255,255,255,0.2);
                }

                .hero{
                    height:360px;
                }

                .message{
                    margin:25px 15px;
                }

                .message h2{
                    font-size:26px;
                }
            }

        </style>
    </head>
   
    <body>

    　　<header>
            <h1>
                <span class="logo-tt">T.T</span>
                <span class="logo-ja">ファーム</span>
            </h1>
            <p>農園紹介</p>
        </header>

        <button class="menu-button"
        onclick="toggleMenu()">≡</button>

        <nav id="nav-menu">
            <a href="index.html">ホーム</a>
            <a href="about.html">農園紹介</a>
            <a href="gallery.html">ギャラリー</a>
            <a href="#">農家の一年</a>
            <a href="#">農園日記</a>
            <a href="#">クイズ</a>
            <a href="#">イベント</a>
            <a href="#">販売</a>
            <a href="#">お問い合わせ</a>
        </nav>

        <div class="section">
            <h2>T.Tファームについて</h2>
            <p>
                T.Tファームは信州の豊かな自然の中で、
                小麦・大豆・お米・ぶどう・もも・しいたけなど、
                さまざまな農産物を育てています。
            </p>

            <p>
                地域の農地を守りながら、
                安心して食べられる農産物作りに取り組んでいます。
            </p>
        </div>

        <div class="section">
            <h2>栽培している作物</h2>

            <div class="crop-cards">
                <div class="crop-card">
                    <img src="images/grape.jpg" alt="ぶどう">
                    <h3>ぶどう</h3>    
                </div>

                <div class="crop-card">
                    <img src="images/shiitake.jpg" alt="しいたけ">
                    <h3>しいたけ</h3>    
                </div>
            </div>

        </div>

        <div class="section">
            <h2>私たちの思い</h2>

            <p>
                「育てる楽しさ」と「食べる喜び」を
                多くの方に届けられる農園を目指しています。
            </p>
        </div>

    　　<footer>
            © T.Tファーム
        </footer>

        <script>
            function toggleMenu(){
                const menu =
                document.getElementById("nav-menu");
                menu.classList.toggle("open");
            }
        </script>

    </body>
</html>
