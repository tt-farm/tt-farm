    <script>
        const sheetUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRIJckT29tSM4bkVYposxeHJiS_Q8lyrN_UtEz-ErNcmwnSkTnyDy644fsz7MA6Brla-wiP6SogQA0E/pub?output=csv";

        const categoryLabels = {
            "すべて":"すべて",
            "ぶどう":"ぶどう",
            "しいたけ":"原木しいたけ",
            "米":"米",
            "もも":"もも",
            "山菜":"山菜",            
            "小菊":"小菊",
            "ひまわり":"ひまわり",
            "小麦":"小麦",
            "大豆":"大豆",    
        };

        const categories = Object.keys(categoryLabels);

        const months = [
            "すべて","1月","2月","3月","4月","5月","6月",
            "7月","8月","9月","10月","11月","12月"
        ];

        let diaryData = [];
        const params = new URLSearchParams(window.location.search);
        const initialCategory = params.get("category");
        let selectedCategory = "すべて";
        let selectedMonth = "すべて";

        function convertDriveUrl(url){
            if(!url) return "";

            const match = url.match(/\/d\/([^/]+)/);

            if(match){
                const fileId = match[1];
                return `https://lh3.googleusercontent.com/d/${fileId}`;
            }

            return url;
        }

        function parseCSV(csv){
            const rows = [];
            let row = [];
            let cell = "";
            let inQuotes = false;

            for(let i = 0; i < csv.length; i++){
                const char = csv[i];
                const next = csv[i + 1];

                if(char === '"' && inQuotes && next === '"'){
                    cell += '"';
                    i++;
                }else if(char === '"'){
                    inQuotes = !inQuotes;
                }else if(char === "," && !inQuotes){
                    row.push(cell);
                    cell = "";
                }else if((char === "\n" || char === "\r") && !inQuotes){
                    if(cell !== "" || row.length > 0){
                        row.push(cell);
                        rows.push(row);
                        row = [];
                        cell = "";
                    }
                }else{
                    cell += char;
                }
            }

            if(cell !== "" || row.length > 0){
                row.push(cell);
                rows.push(row);
            }

            return rows;
        }

        function getMonthFromDate(dateText){
            const match = dateText.match(/(\d{1,2})[\/月](\d{1,2})|(\d{4})[\/\-](\d{1,2})[\/\-](\d{1,2})/);

            const date = new Date(dateText);

            if(!isNaN(date)){
                return date.getMonth() + 1;
            }

            return null;
        }

        function createSelects(){

            const categorySelect = document.getElementById("category-select");
            const monthSelect = document.getElementById("month-select");

            categorySelect.innerHTML = "";
            monthSelect.innerHTML = "";

            const sortedCategories = categories.slice().sort((a,b) =>{
                if(a === "すべて") return -1;
                if(b === "すべて") return 1;

                const aHas = diaryData.some(item=> item.category === a);
                const bHas = diaryData.some(item=> item.category === b);

                if(aHas && !bHas) return -1;
                if(!aHas && bHas) return 1;

                return 0;
            });

            const sortedMonths = months.slice().sort((a,b) =>{
                if(a === "すべて") return -1;
                if(b === "すべて") return 1;

                const aNum = Number(a.replace("月",""));
                const bNum = Number(b.replace("月",""));

                const aHas = diaryData.some(item => getMonthFromDate(item.date) === aNum);
                const bHas = diaryData.some(item => getMonthFromDate(item.date) === bNum);

                if(aHas && !bHas) return -1;
                if(!aHas && bHas) return 1;

                return aNum - bNum;
            });
    
            sortedCategories.forEach(category => {
                const option = document.createElement("option");
                option.value = category;
                option.textContent = categoryLabels[category];
        
                categorySelect.appendChild(option);
            });

            sortedMonths.forEach(month => {
                const option = document.createElement("option");
                option.value = month;
                option.textContent = month;
        
                monthSelect.appendChild(option);
            });

            categorySelect.value = selectedCategory;
            monthSelect.value = selectedMonth;

            categorySelect.onchange = () => {
                selectedCategory = categorySelect.value;
                updateSelectOptions();
                showDiary();
            };

            monthSelect.onchange = () => {
                selectedMonth = monthSelect.value;
                updateSelectOptions();
                showDiary();
            };

            categorySelect.value = selectedCategory;
            monthSelect.value = selectedMonth;

            updateSelectOptions();

        }

        function updateSelectOptions(){
            const categorySelect = document.getElementById("category-select");
            const monthSelect = document.getElementById("month-select");

            Array.from(categorySelect.options).forEach(option => {
                const category = option.value;
                if(category === "すべて"){
                    option.disabled = false;
                    return;
                }

                const hasArticle = diaryData.some(item => {
                    const categoryOK = item.category === category;

                    const itemMonth = getMonthFromDate(item.date);
                    const monthOK = 
                        selectedMonth === "すべて" ||
                        itemMonth === Number(selectedMonth.replace("月",""));
            
                    return categoryOK && monthOK;
                });

                option.disabled = !hasArticle;
            });

            Array.from(monthSelect.options).forEach(option => {
                const month = option.value;
                if(month === "すべて"){
                    option.disabled = false;
                    return;
                }

                const hasArticle = diaryData.some(item => {
                    const itemMonth = getMonthFromDate(item.date);
                    const monthOK = 
                        itemMonth === Number(month.replace("月",""));
                    const categoryOK = 
                        selectedCategory === "すべて" ||
                        item.category === selectedCategory;
                    return categoryOK && monthOK;
                });

                option.disabled = !hasArticle;

            });   
    
        }

        function getPhotoClass(count){
            if(count === 1) return "one-photo";
            if(count === 2) return "two-photo";
            if(count === 3) return "three-photo";
            if(count === 4) return "four-photo";
            if(count >= 5) return "many-photo";
            return "";
        }

        function showDiary(){
            updateSelectOptions();
            const container = document.getElementById("diary-container");
            container.innerHTML = "";
    
            const filteredData = diaryData.filter(item => {
                const categoryOK =
                    selectedCategory === "すべて" ||
                    item.category === selectedCategory;

                const itemMonth = getMonthFromDate(item.date);

                const monthOK =
                    selectedMonth === "すべて" ||
                    itemMonth === Number(selectedMonth.replace("月",""));

                return categoryOK && monthOK;
            });

            if(filteredData.length === 0){
                container.innerHTML = "<p>日記はまだありません。</p>";
                return;
            }

            filteredData.forEach(item => {
                const images = item.imageText
                    .split(";")
                    .map(url => convertDriveUrl(url.trim()))
                    .filter(url => url !== "");

                const photoClass = getPhotoClass(images.length);

                const imageHtml = images.map((image, index) => `
                    <img src="${image}"
                    alt="${item.date} ${categoryLabels[item.category]} 「${item.title}」の農園写真${images.length >1 ? ` ${index + 1}` : ""}"
                    class="diary-photo"
                    onclick="openLightbox('${image}')"
                    style="cursor:zoom-in">
                `).join("");

                container.innerHTML += `
                    <section class="section">
                        <div class="diary-photos ${photoClass}">
                            ${imageHtml}
                        </div>

                        <p><strong>${item.date}</strong></p>
                        <p>${item.category === "しいたけ" ? "原木しいたけ" : item.category}</p>
                        <h2>${item.title}</h2>
                        <p class="diary-text">${item.text}</p>
                    </section>
                `;
            });
        }

        fetch(sheetUrl)
        .then(response => response.text())
        .then(csv => {
            const rows = parseCSV(csv).slice(1);

            diaryData = rows.map(columns => {
                return {
                    date: columns[0] || "",
                    category: columns[1] || "",
                    title: columns[2] || "",
                    text: columns[3] || "",
                    imageText: columns[4] || ""
                };
            }).filter(item => item.title !== "").reverse();

            if(initialCategory){
                selectedCategory = initialCategory;
            }

            createSelects();
            showDiary();
        })
        .catch(error => {
            document.getElementById("diary-container").innerHTML =
                "<p>農園日記を読み込めませんでした。</p>";
            console.error(error);
        });

        function toggleMenu(){
            const menu = document.getElementById("nav-menu");
            menu.classList.toggle("open");
        }

        function openLightbox(src){

            document.getElementById("lightbox-img").src = src;

            document.getElementById("lightbox").classList.add("open");

        }

        function closeLightbox(){

            document.getElementById("lightbox").classList.remove("open");

        }

    </script>

    <div id="lightbox" class="lightbox" onclick="closeLightbox()">

        <span class="lightbox-close">&times;</span>

        <img id="lightbox-img" onclick="event.stopPropagation();">

    </div>
