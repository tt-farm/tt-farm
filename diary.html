            .one-photo .diary-photo{

            }

            .two-photo .diary-photo{

            }

            .three-photo .diary-photo,
            .four-photo .diary-photo,

            .diary-photo{
                width:100%;
                height:220px;
                object-fit:cover;
                border-radius:12px;
            }

            .diary-buttons,
            .month-buttons{            
                display:flex;
                justify-content:center;
                flex-wrap:wrap;

            .diary-buttons button,
            .month-buttons button{
                background:#6d8f3f;
                color:white;
                border:none;
                padding:10px 18px;
                font-weight:bold;
                cursor:pointer;
            }

            .diary-buttons button:hover,
            .diary-buttons button.active,
            .month-buttons button:hover,
            .month-buttons button.active{

            }

            @media(max-width:768px){
                .diary-photos{

                }

    <body>

    　　<header>
            <h1>
                <span class="logo-tt">T.T</span>

        <main>
            <div class="diary-buttons" id="diary-buttons"></div>
            <div class="month-buttons" id="month-buttons"></div>
            <div id="diary-container"></div>
        </main>

        <script>
            const sheetUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRIJckT29tSM4bkVYposxeHJiS_Q8lyrN_UtEz-ErNcmwnSkTnyDy644fsz7MA6Brla-wiP6SogQA0E/pub?output=csv";

            function convertDriveUrl(url){
                if(!url) return "";

                const match = url.match(/\/d\/([^/]+)/);
                
                if(match){
                    const fileId = match[1];
                    return`https://lh3.googleusercontent.com/d/${fileId}`;
                }
                return url;
            }

            const categoryNames = {
                all:"すべて",
                grape:"ぶどう",
                shiitake:"しいたけ",
                rice:"米",
                soybean:"大豆",
                chrysanthemum:"小菊",
                sunflower:"ひまわり",
                sansai:"山菜",
                peach:"もも",
                wheat:"小麦",    
            };

            function createMonthButtons(){
                const area = document.getElementById("month-buttons");
                area.innerHTML = "";
                const months = [
                    "すべて","1月","2月","3月","4月","5月","6月"
                    ,"7月","8月","9月","10月","11月","12月"
                ];
                months.forEach(month=>{
                    const button = document.createElement("button");
                    button.textContent = month;
                    button.id="month-btn-" + month;
                    button.onclick = () => {
                        selectedMonth = month;
                        showDiary();
                    };
                    area.appendChild(button);
                });
            }

            let diaryData = [];
            let selectedCategory = "すべて";
            let selectedMonth = "すべて";

            fetch(sheetUrl)
            .then(response => response.text())
            .then(csv => {
                const rows = parseCSV(csv).slice(1);

                diaryData = rows.map(columns => {
                    return {
                        date: columns[0],
                        category: columns[1],
                        title: columns[2],
                        text: columns[3],
                        imageText: columns[4] || ""
                    };
                }).reverse();

                createDiaryButtons();
                createMonthButtons();
                showDiary();
            })
            .catch(error => {
                document.getElementById("diary-container").innerHTML =
                "<p>農園日記を読み込めませんでした。</p>";
                console.error(error);
            });

            function createDiaryButtons(){
                const buttonArea = 
                document.getElementById("diary-buttons");
                buttonArea.innerHTML="";

                Object.keys(categoryNames).forEach(category => {
                    const button = document.createElement("button");
                    button.textContent = categoryNames[category];
                    button.id = "diary-btn-" + category;
                    button.onclick = () => {
                        selectedCategory =category;
                        showDiary();
                    };
                    buttonArea.appendChild(button);
                });
            }

            function showDiary(){
                const container = document.getElementById("diary-container");
                container.innerHTML = "";

                document.querySelectorAll(".diary-buttons button")
                .forEach(button => button.classList.remove("active"));

                document.querySelectorAll(".month-buttons button")
                .forEach(button => button.classList.remove("active"));

                const activeCategoryButton = document.getElementById("diary-btn-" + selectedCategory);
                const activeMonthButton = document.getElementById("month-btn-" + selectedMonth);

                if(activeCategoryButton){
                    activeCategoryButton.classList.add("active");
                }

                if(activeMonthButton){
                    activeMonthButton.classList.add("active");
                }
                
                const filteredData = diaryData.filter(item => {
                    const categoryOK = selectedCategory === "すべて" ||
                    item.category === categoryNames[selectedCategory];
                    const date = new Date(item.date);
                    const month = date.getMonth() + 1;
                    const monthOK = 
                        selectedMonth === "すべて" ||
                        month === Number(selectedMonth.replace("月",""));
                    return categoryOK && monthOK;
                });    

                if(filteredData.length === 0){
                    container.innerHTML = "<p>日記はまだありません。</p>";
                    return;
                }

                filteredData.forEach(item => {
                    const images = item.imageText
                        .split(";")
                        .map(url => convertDriveUrl(url.trim()))
                        .filter(url => url !== "");

                    const imageHtml = images.map(image => `
                        <img src="${image}" alt="${item.title}" class="diary-photo">
                    `).join("");

                    container.innerHTML += `
                        <section class="section">
                            <div class="diary-photos">
                              ${imageHtml}
                            </div>

                            <p><strong>${item.date}</strong></p>
                            <p>${item.category}</p>
                            <h2>${item.title}</h2>
                            <p>${item.text}</p>
                        </section>
                    `;
                });
            }
        </script>
