<!DOCTYPE html>
<html lang="ja">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport"
        content="width=device-width, initial-scale=1.0>"
        <title>T.Tファーム|農園日記</title>
        
        <style>
            body{
                margin:0;
                font-family:"Yu Gothic","Hiragino Sans",sans-serif;
                background:#fffaf0;
                color:#333;
            }

            header{
                background:#f6d77a;
                color:#4e342e;
                text-align:center;
                padding:22px;
            }

            header h1{
                margin:0;
                font-size:42px;
            }
            
            .logo-tt{
                font-family:'Great Vibes',cursive;
                margin-right:10px;
            }

            .logo-ja{
                font-family:"Yu Gothic","Hiragino Sans",sans-serif;
                font-weight:bold;
            }

            header p{
                margin:8px 0 0;
                font-size:18px;
            }

            .menu-button{
                display:none;
                position:fixed;
                top:30px;
                left:15px;
                z-index:1001;
                background:#33691E;
                color:white;
                border:none;
                font-size:28px;
                padding:8px 14px;
                cursor:pointer;
                border-radius:6px;
            }

            nav{
                background:#33691E;
                display:flex;
                justify-content:center;
                flex-wrap:wrap;
            }

            nav a{
                color:white;
                text-decoration:none;
                padding:12px 20px;
                font-weight:bold;
                border-right:1px solid
                rgba(255,255,255,0.25);
            }
            nav a:hover{
                background:#558B2F;
            }

            @media(max-width:768px){

                .menu-button{
                    display:block;
                }

                nav{
                    position:fixed;
                    top:0;
                    left:-260px;
                    width:240px;
                    height:100vh;
                    background:#33691E;
                    display:flex;
                    flex-direction:column;
                    justify-content:flex-start;
                    padding-top:70px;
                    transition:0.3s;
                    z-index:1000;
                }
               
                nav.open{
                    left:0;
                }

                nav a{
                    border-right:none;
                    border-bottom:1px solid rgba(255,255,255,0.25);
                    text-align:left;
                    padding:16px 20px;
                }
            }
            main{
                max-width:1100px;
                margin:40px auto;
                padding:20px;
            }
        
            h2{
                color:#6d8f3f;
            }
        
            .section{
                background:white;
                padding:30px;
                margin-bottom:30px;
                border-radius:12px;
                box-shadow:0 4px 10px rgba(0,0,0,0.1);
            }

            .section h2{
                color:#6d8f3f;
            }

            .section ul{
                line-height:2;
            }

            .diary-photo{
                width:100%;
                height:220px;
                object-fit:cover;
                border-radius:12px;
            }

            .diary-photos{
                display:grid;
                gap:15px;
                margin-bottom:20px
                width:100%;
            }

            .four-photo{
                grid-template-columns:1fr 1fr;
            }

            .two-photo{
                grid-template-columns:1fr 1fr;
            }

            .many-photo{
                grid-template-columns:1fr 1fr 1fr;
            }

            .three-photo{
                grid-template-columns:1fr 1fr 1fr;
            }

            .one-photo .diary-photo{
                height:450px;
            }

            .two-photo .diary-photo{
                height:320px;
            }

            .three-photo .diary-photo,
            .four-photo .diary-photo,
            .many-photo .diary-photo{
                height:250px;
            }

            .diary-photo{
                width:100%;
                height:220px;
                object-fit:cover;
                border-radius:12px;
            }

            @media(max-width:768px){
                .diary-photos{
                    grid-template-columns:1fr;
                }
                .diary-photo{
                    height:auto;
                }
            }

            footer{
                background:#6d8f3f;
                color:white;
                text-align:center;
                padding:20px;
            }

            @media(max-width:768px){
                header h1{
                    font-size:30px;
                }
                
                nav a{
                    width:100%;
                    text-align:center;
                    border-bottom:1px solid
                    rgba(255,255,255,0.2);
                }

                .hero{
                    height:360px;
                }

                .message{
                    margin:25px 15px;
                }

                .message h2{
                    font-size:26px;
                }
            }

        </style>
    </head>
   
    <body>

    　　<header>
            <h1>
                <span class="logo-tt">T.T</span>
                <span class="logo-ja">ファーム</span>
            </h1>
            <p>農園日記</p>
        </header>

        <button class="menu-button"
        onclick="toggleMenu()">≡</button>

        <nav id="nav-menu">
            <a href="index.html">ホーム</a>
            <a href="about.html">農園紹介</a>
            <a href="gallery.html">ギャラリー</a>
            <a href="year.html">農家の一年</a>
            <a href="diary.html">農園日記</a>
            <a href="quiz.html">クイズ</a>
            <a href="event.html">イベント</a>
            <a href="https://ttfarm.theshop.jp" target="_blank">購入（外部サイト）</a>
            <a href="contact.html">お問い合わせ</a>
        </nav>

        <main>
            <div id="diary-container"></div>
        </main>

        <script>
            const sheetUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRIJckT29tSM4bkVYposxeHJiS_Q8lyrN_UtEz-ErNcmwnSkTnyDy644fsz7MA6Brla-wiP6SogQA0E/pub?output=csv";

            function convertDriveUrl(url){
                if(!url) return "";

                const match = url.match(/\/d\/([^/]+)/);
                
                if(match){
                    const fileId = match[1];
                    return`https://lh3.googleusercontent.com/d/${fileId}`;
                }
                return url;
            }

            fetch(sheetUrl)
            .then(response => response.text())
            .then(csv => {
                const rows = csv.trim().split("\n").slice(1);
                rows.reverse();
                const container = document.getElementById("diary-container");
                rows.forEach(row => {
                    const columns = row.split(",");
                    const date = columns[0];
                    const title = columns[1];
                    const text = columns[2];
                    const imageText = columns[3] || "";

                    const images = imageText
                        .split(";")
                        .map(url => convertDriveUrl(url.trim()))
                        .filter(url => url !== ""); 
                                               
                    const imageHtml = images.map(image => `
                        <img src="${image}" alt="${title}" class="diary-photo">
                    `).join("");

                    let photoClass = "";

                    if(images.length === 1){
                        photoClass = "one-photo";                
                    }else if(images.length ===2){
                        photoClass = "two-photo";                    
                    }else if(images.length ===3){
                        photoClass = "three-photo";                    
                    }else if(images.length ===4){
                        photoClass = "four-photo";                    
                    }else{
                        photoClass = "many-photo"};
                    
                    container.innerHTML += `
                    <section class="section">
                        <div class="diary-photos ${photoClass}">
                            ${imageHtml}
                        </div>                        
                        <h2>${title}</h2>
                        <p><strong>${date}</strong></p>
                        <p>${text}</p>
                    </section>    
                    `;
                });
            });
        </script>

            <p>
                <a href="https://lin.ee/XFZeWaB">LINE</a> |

            <p>© T.Tファーム</p>
        </footer>

        <script>
            function toggleMenu(){
                const menu =
                document.getElementById("nav-menu");
                menu.classList.toggle("open");
            }
        </script>

    </body>
</html>
