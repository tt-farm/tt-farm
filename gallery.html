<!DOCTYPE html>
<html lang="ja">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport"
        content="width=device-width, initial-scale=1.0">
        <title>T.Tファーム|ギャラリー</title>
        
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap" rel="stylesheet">
        
        <style>
            body{
                margin:0;
                font-family:"Yu Gothic","Hiragino Sans",sans-serif;
                background:#fffaf0;
                color:#333;
            }

            header{
                background:#f6d77a;
                color:#4e342e;
                text-align:center;
                padding:22px;
            }

            header h1{
                margin:0;
                font-size:42px;
            }
            
            .logo-tt{
                font-family:'Great Vibes', 'Brush Script MT',cursive;
                margin-right:10px;
            }

            .logo-ja{
                font-family:"Yu Gothic","Hiragino Sans",sans-serif;
                font-weight:bold;
            }

            header p{
                margin:8px 0 0;
                font-size:18px;
            }

            .menu-button{
                display:none;
                position:fixed;
                top:30px;
                left:15px;
                z-index:1001;
                background:#33691E;
                color:white;
                border:none;
                font-size:28px;
                padding:8px 14px;
                cursor:pointer;
                border-radius:6px;
            }

            nav{
                background:#33691E;
                display:flex;
                justify-content:center;
                flex-wrap:wrap;
            }

            nav a{
                color:white;
                text-decoration:none;
                padding:12px 20px;
                font-weight:bold;
                border-right:1px solid
                rgba(255,255,255,0.25);
            }
            nav a:hover{
                background:#558B2F;
            }
               
            main{
                max-width:1200px;
                margin:40px auto;
                padding:0 20px;
            }

            .page-title{
                text-align:center;
                color:#33691E;
                margin-bottom:30px;
            }

            .category-buttons{
                display:flex;
                justify-content:center;
                flex-wrap:wrap;
                gap:10px;
                margin-bottom:30px;
            }

            .category-buttons button{
                background:#6d8f3f;
                color:white;
                border:none;
                padding:10px 18px;
                font-weight:bold;
                cursor:pointer;
            }

            .category-buttons button:hover,
            .category-buttons button.active{
                background:#33691E;
            }

            .gallery{
                display:grid;
                grid-template-columns:repeat(3,1fr);
                gap:25px;
            }

            .category-card{
                cursor:pointer;
            }

            .category-card:hover{
                transform:translateY(-4px);
                transition:0.3s
            }

            .back-button{
                background:#6d8f3f;
                color:white;
                border:none;
                padding:12px 24px;
                font-weight:bold;
                cursor:pointer;
            }

            .back-button:hover{
                background:#33691E;
            }

            .diary-link{
                display:inline-block;
                background:#6d8f3f;
                color:white;
                text-decoration:none;
                padding:12px 24px;
                border-radius:8px;
                font-weight:bold;
            }

            .diary-link:hover{
                background:#33691E;
            }

            .empty-card{
                display:flex;
                justify-content:center;
                align-items:center;
                height:250px;
                box-shadow:none;
                background:transparent;
            }

            .category-only{
                width:80%;
                padding:18px;
                background:#6d8f3f;
                color:white;
                border:none;
                border-radius:10px;
                font-size:20px;
                font-weight:bold;
            }

            .category-only:hover{
                background:#33691E
            }

            .photo-card{
                background:white;
                border-radius:12px;
                overflow:hidden;
                box-shadow:0 4px 10px rgba(0,0,0,0.1);
            }

            .photo-card img{
                width:100%;
                height:250px;
                object-fit:cover;
                display:block;
            }

            .photo-card p{
                text-align:center;
                color:#33691E;
                font-weight:bold;
                margin:14px;
            }
        
            footer{
                background:#33691E;
                color:white;
                text-align:center;
                padding:20px;
                margin-top:50px;
            }

            footer a{
                color:white;
            }

            @media(max-width:900px){
                .gallery{
                    grid-template-columns:repeat(2,1fr);
                }
            }



            @media(max-width:600px){
                .gallery{
                    grid-template-columns:1fr;
                }
            }

            @media(max-width:768px){

                .menu-button{
                    display:block;
                }

                nav{
                    position:fixed;
                    top:0;
                    left:-260px;
                    width:240px;
                    height:100vh;
                    background:#33691E;
                    display:flex;
                    flex-direction:column;
                    justify-content:flex-start;
                    padding-top:70px;
                    transition:0.3s;
                    z-index:1000;
                }
               
                nav.open{
                    left:0;
                }

                nav a{
                    border-right:none;
                    border-bottom:1px solid rgba(255,255,255,0.25);
                    text-align:left;
                    padding:16px 20px;
                }
            }

            @media(max-width:768px){
                header h1{
                    font-size:30px;
                }
            }
            
            .lightbox{
                display:none;
                position:fixed;
                inset:0;
                background:rgba(0,0,0,0.9);
                justify-content:center;
                align-items:center;
                z-index:9999;
            }

            .lightbox.open{
                display:flex;
            }

            .lightbox img{
                max-width:90%;
                max-height:85%;
                object-fit:contain;
                border-radius:10px;
            }

            .lightbox-close,
            .lightbox-prev,
            .lightbox-next{
                position:absolute;
                color:white;
                font-size:45px;
                cursor:pointer;
                user-select:none;
            }

            .lightbox-close{
                top:20px;
                right:30px;
            }

            .lightbox-prev{
                left:25px;
                top:50%;
                transform:translateY(-50%);
            }

            .lightbox-next{
                right:25px;
                top:50%;
                transform:translateY(-50%);
            }

            .lightbox-caption{
                position:absolute;
                bottom:25px;
                left:50%;
                transform:translateX(-50%);
                color:white;
                text-align:center;
                font-size:18px;
            }
                                
        </style>

        

        <!-- Google tag (gtag.js) -->
        <script async src="https://www.googletagmanager.com/gtag/js?id=G-S2LG05GGPD"></script>
        <script>
            window.dataLayer = window.dataLayer || [];
            function gtag(){dataLayer.push(arguments);}gtag('js',new Date());
            gtag('config', 'G-S2LG05GGPD');
        </script>
    </head>

    <body>

        <header>
             <h1>
                <span class="logo-tt">T.T</span>
                <span class="logo-ja">ファーム</span>
            </h1>
            <p>ギャラリー</p>
        </header>

        <button class="menu-button"
        onclick="toggleMenu()">≡</button>

        <nav id="nav-menu">
            <a href="index.html">ホーム</a>
            <a href="about.html">農園紹介</a>
            <a href="gallery.html">ギャラリー</a>
            <a href="year.html">農家の一年</a>
            <a href="diary.html">農園日記</a>
            <a href="quiz.html">クイズ</a>
            <a href="event.html">イベント</a>
            <a href="https://ttfarm.theshop.jp" target="_blank">購入（外部サイト）</a>
            <a href="contact.html">お問い合わせ</a>
        </nav>

        <main>
            
            <h2 class="page-title">農園の風景</h2>

            <div class="category-buttons" id="category-buttons"></div>

            <section class="gallery" id="gallery"></section>

        </main>

        <footer>
            <p>
                <a href="https://lin.ee/XFZeWaB">LINE</a> |
                <a href="https://youtube.com/channel/UCWCrfZPdQvZXiJXD6ffQQnA?si=4Xva8m6RVkRZvQrc">YouTube</a> |
                <a href="https://ttfarm.theshop.jp">オンラインショップ</a> ｜
                <a href="contact.html">お問い合わせ</a>
            </p>

            <p>© T.Tファーム</p>
        </footer>

        <script>

            const diaryCsvUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRIJckT29tSM4bkVYposxeHJiS_Q8lyrN_UtEz-ErNcmwnSkTnyDy644fsz7MA6Brla-wiP6SogQA0E/pub?output=csv";
            let diaryCategories = [];
            const galleryApi = "https://script.google.com/macros/s/AKfycbwvcu3Qsq_C1kUCfCpQsJdoiQTBw9G9mDC0lKsmVlaOvEJM2cJh4e2XMq6zsWOOcV__/exec";

            const categoryNames = {
                grape:"ぶどう",
                shiitake:"しいたけ",
                rice:"米",
                soybean:"大豆",
                sunflower:"ひまわり",
                chrysanthemum:"小菊",
                sansai:"山菜",
                peach:"もも",
                wheat:"小麦",
                products:"商品",
                animals:"農園で出会った生き物",
                machinery:"農機具",
            };

            const params = new URLSearchParams(window.location.search);
            const initialCategory = params.get("category");

            let coverData = {};

            Promise.all([
                fetch(galleryApi).then(response => response.json()),
                fetch(diaryCsvUrl).then(response => response.text())
            ])
            
            .then(([gallery, csv]) => {
                coverData = gallery;
                diaryCategories = csv
                    .trim()
                    .split("\n")
                    .slice(1)
                    .map(row => row.split(",")[1])
                    .filter(category => category);
            
                if(initialCategory && categoryNames[initialCategory]){
                    showGallery(initialCategory);
                }else{
                showCategoryTop();
                }
            })
            .catch(error => {
                document.getElementById("gallery").innerHTML =
                    "<p>ギャラリーを読み込めませんでした。</p>";
                    console.error(error);
            });                     

            function showCategoryTop(){
                const gallery = document.getElementById("gallery");
                const title = document.querySelector(".page-title");
                title.textContent = "ギャラリー";
                gallery.innerHTML = "";
                
                const sortedCategories=
                Object.keys(categoryNames).sort((a,b) => {
                    const aHas = coverData[a] !== null && coverData[a] !== undefined;
                    const bHas = coverData[b] !== null && coverData[b] !== undefined;

                    if(aHas && !bHas) return -1;
                    if(!aHas && bHas) return 1;

                    return 0;
                });

                sortedCategories.forEach(category => {
                    const cover = coverData[category];
                    if(!cover){
                        gallery.innerHTML += `
                            <div class="photo-card empty-card">
                                <button class="category-only" onclick="showGallery('${category}')">
                                    ${categoryNames[category]}
                                </button>
                            </div>
                        `;
                        return;
                    }

                    gallery.innerHTML += `
                        <div class="photo-card category-card" onclick="showGallery('${category}')">
                            <img src="${cover.url}" alt="${categoryNames[category]}">
                            <p>${categoryNames[category]}</p>
                        </div>
                    `;
                });
            }

            function showGallery(category){
                const gallery = document.getElementById("gallery");
                const title = document.querySelector(".page-title");
                title.textContent = categoryNames[category];
                const hasDiary = diaryCategories.includes(categoryNames[category]);
                gallery.innerHTML = `                  
                    <div style="grid-column:1/-1;text-align:center;margin-bottom:20px;">
                        <button class="back-button" onclick="showCategoryTop()">← ギャラリー 一覧へ戻る</button>
                        ${
                            hasDiary
                            ? `
                            <br><br>
                            <a class="diary-link" href="diary.html?category=${encodeURIComponent(categoryNames[category])}">
                                📖 この作物の農園日記を見る
                            </a>
                            `
                            : ""
                        }
                        
                    </div>

                    <p style ="grid-column:1/-1;text-align:center;">
                        読み込み中…
                    </p>
                `;
                
                fetch(`${galleryApi}?mode=category&category=${category}`)
                    .then(response => response.json())
                    .then(photos => {    
                        
                        photos.sort((a,b) => {
                            if (a.isCover && !b.isCove) return -1;
                            if (!a.isCover && b.isCove) return 1;
                            return a.name.localeCompare(b.name,"ja");
                        });
                
                        gallery.innerHTML = `                  
                            <div style="grid-column:1/-1;text-align:center;margin-bottom:20px;">
                                <button class="back-button" onclick="showCategoryTop()">← ギャラリー 一覧へ戻る</button>
                                ${
                                    hasDiary
                                    ? `
                                        <br><br>
                                        <a class="diary-link" href="diary.html?category=${encodeURIComponent(categoryNames[category])}">
                                            📖 この作物の農園日記を見る
                                        </a>
                                    `
                                    : ""
                                }
                            </div>
                        `;                

                    currentPhotos = photos;

                    photos.forEach((photo,index) => {
                        gallery.innerHTML += `
                            <div class="photo-card">
                                <img src="${photo.url}"
                                 alt="${photo.name}"
                                 onclick="openLightbox(${index})"
                                 style="cursor:zoom-in;">
                                <p>${photo.name}</p>
                            </div>
                        `;
                    });
                });
            }             
            
            function toggleMenu(){
                const menu = document.getElementById("nav-menu");
                menu.classList.toggle("open");
            }

            let currentPhotos = [];
            let currentIndex = 0;

            function openLightbox(index){

                currentIndex = index;

                document.getElementById("lightbox").classList.add("open");

                showLightboxPhoto();
            }

            function showLightboxPhoto(){

                const photo = currentPhotos[currentIndex];

                document.getElementById("lightbox-img").src = photo.url;

                document.getElementById("lightbox-caption").textContent =
                    photo.name + "　(" + (currentIndex+1) + " / " + currentPhotos.length + ")";
            }

            function closeLightbox(){

                document.getElementById("lightbox").classList.remove("open");
            }

            function nextPhoto(){

                currentIndex++;

                if(currentIndex >= currentPhotos.length){
                    currentIndex = 0;
                }

                showLightboxPhoto();
            }

            function prevPhoto(){

                currentIndex--;

                if(currentIndex < 0){
                    currentIndex = currentPhotos.length-1;
                }

                showLightboxPhoto();
            }

            document.addEventListener("keydown",e=>{

                if(!document.getElementById("lightbox").classList.contains("open")) return;

                if(e.key==="ArrowRight") nextPhoto();

                if(e.key==="ArrowLeft") prevPhoto();

                if(e.key==="Escape") closeLightbox();

            });

        </script>

        <div id="lightbox" class="lightbox">

            <span class="lightbox-close" onclick="closeLightbox()">×</span>

            <span class="lightbox-prev" onclick="prevPhoto()">❮</span>

            <img id="lightbox-img">

            <span class="lightbox-next" onclick="nextPhoto()">❯</span>

            <div class="lightbox-caption" id="lightbox-caption"></div>

        </div>

    </body>
</html>
