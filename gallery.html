            const params = new URLSearchParams(window.location.search);
            const initialCategory = params.get("category");

            let coverData = {};

            Promise.all([
                fetch(galleryApi).then(response => response.json()),
                fetch(diaryCsvUrl).then(response => response.text())
            ])
            
            .then(([gallery, csv]) => {
                coverData = gallery;
                diaryCategories = csv
                    .trim()
                    .split("\n")
                    .slice(1)
                    .map(row => row.split(",")[1])
                    .filter(category => category);
            
                if(initialCategory && categoryNames[initialCategory]){
                    showGallery(initialCategory);
                }else{
                showCategoryTop();
                }
            })
            .catch(error => {
                document.getElementById("gallery").innerHTML =
                    "<p>ギャラリーを読み込めませんでした。</p>";
                    console.error(error);
            });                     

            function showCategoryTop(){
                const gallery = document.getElementById("gallery");
                const title = document.querySelector(".page-title");
                const description = document.getElementById("gallery-description");
                resetGallerySeo();
                title.textContent = "ギャラリー";
                description.textContent = "T.Tファームで育てている作物や、農園で出会った生き物、信州の自然を写真でご紹介します。気になるカテゴリーを選んでご覧ください。";
                history.replaceState({},"","gallery.html");
                gallery.innerHTML = "";
                
                const sortedCategories=
                Object.keys(categoryNames).sort((a,b) => {
                    const aHas = coverData[a] !== null && coverData[a] !== undefined;
                    const bHas = coverData[b] !== null && coverData[b] !== undefined;

                    if(aHas && !bHas) return -1;
                    if(!aHas && bHas) return 1;

                    return 0;
                });

                sortedCategories.forEach(category => {
                    const cover = coverData[category];
                    if(!cover){
                        gallery.innerHTML += `
                            <div class="photo-card empty-card">
                                <button class="category-only" onclick="showGallery('${category}')">
                                    ${categoryNames[category]}
                                </button>
                            </div>
                        `;
                        return;
                    }

                    gallery.innerHTML += `
                        <div class="photo-card category-card" onclick="showGallery('${category}')">
                            <img src="${cover.url}" alt="${categoryNames[category]}の写真">
                            <p>${categoryNames[category]}</p>
                        </div>
                    `;
                });
            }

            function showGallery(category){
                const seo = categorySeo[category];

                if(!seo){
                    showCategoryTop();
                    return;
                }

                const gallery = document.getElementById("gallery");
                const title = document.querySelector(".page-title");
                const description =
                    document.getElementById("gallery-description");

                updateCategorySeo(category);

                title.textContent = seo.h1;
                description.textContent = seo.text;

                history.pushState(
                    {},
                    "",
                    `gallery.html?category=${encodeURIComponent(category)}`
                );

                const diaryCategory =
                    category === "shiitake"
                    ? "しいたけ"
                    : categoryNames[category];

                const hasDiary =
                diaryCategories.includes(diaryCategory);

                gallery.innerHTML = `
                    <div class="gallery-heading">
                    <h2>${seo.h2}</h2>

                    <button class="back-button"
                        onclick="showCategoryTop()">
                        ← ギャラリー一覧へ戻る
                    </button>

                    ${
                    hasDiary
                        ? `
                        <a class="diary-link"
                           href="diary.html?category=${encodeURIComponent(diaryCategory)}">
                            この作物の農園日記を見る
                        </a>
                    `
                    : ""
                    }
                    </div>

                    <p class="gallery-loading">
                        読み込み中…
                    </p>
                `;

                fetch(`${galleryApi}?mode=category&category=${encodeURIComponent(category)}`)
                .then(response => {
                if(!response.ok){
                    throw new Error("写真を取得できませんでした。");
                }

                return response.json();
                })
                .then(photos => {
                    photos.sort((a,b) => {
                    if(a.isCover && !b.isCover) return -1;
                    if(!a.isCover && b.isCover) return 1;

                    return a.name.localeCompare(b.name, "ja");
                    });

                    currentPhotos = photos.map(photo => ({
                    ...photo,
                    alt:
                    `${categoryNames[category]}|${photo.name}｜T.Tファーム`
                }));

                const photoHtml = currentPhotos.map((photo, index) => `
                    <div class="photo-card">
                        <img
                            src="${photo.url}"
                            alt="${photo.alt}"
                            loading="lazy"
                            onclick="openLightbox(${index})"
                            style="cursor:zoom-in;"
                        >
                        <p>${photo.name}</p>
                        </div>
                    `).join("");

                    gallery.innerHTML = `
                        <div class="gallery-heading">
                        <h2>${seo.h2}</h2>

                        <button class="back-button"
                            onclick="showCategoryTop()">
                            ← ギャラリー一覧へ戻る
                        </button>

                        ${
                            hasDiary
                                ? `
                                    <a class="diary-link"
                                        href="diary.html?category=${encodeURIComponent(diaryCategory)}">
                                        この作物の農園日記を見る
                                    </a>
                                `
                            : ""
                        }
                    </div>

                    ${
                        photoHtml ||
                        `<p class="gallery-loading">
                            写真は現在準備中です。
                        </p>`
                    }
                    `;
                })
                .catch(error => {
                    gallery.innerHTML = `
                        <div class="gallery-heading">
                        <h2>${seo.h2}</h2>

                        <button class="back-button"
                            onclick="showCategoryTop()">
                            ← ギャラリー一覧へ戻る
                        </button>
                        </div>

                        <p class="gallery-loading">
                        写真を読み込めませんでした。
                        </p>
                        `;

                    console.error(error);
                });
            }
                
                         
            
            function toggleMenu(){
                const menu = document.getElementById("nav-menu");
                menu.classList.toggle("open");
            }

            let currentPhotos = [];
            let currentIndex = 0;

            function openLightbox(index){

                currentIndex = index;

                document.getElementById("lightbox").classList.add("open");

                showLightboxPhoto();
            }

            function showLightboxPhoto(){

                const photo = currentPhotos[currentIndex];
                const lightboxImg = document.getElementById("lightbox-img");

                lightboxImg.src = photo.url;
                lightboxImg.alt = photo.alt || photo.name;

                document.getElementById("lightbox-caption").textContent =
                    photo.name + "　(" + (currentIndex+1) + " / " + currentPhotos.length + ")";
            }

            function closeLightbox(){

                document.getElementById("lightbox").classList.remove("open");
            }

            function nextPhoto(){

                currentIndex++;

                if(currentIndex >= currentPhotos.length){
                    currentIndex = 0;
                }

                showLightboxPhoto();
            }

            function prevPhoto(){

                currentIndex--;

                if(currentIndex < 0){
                    currentIndex = currentPhotos.length-1;
                }

                showLightboxPhoto();
            }

            document.addEventListener("keydown",e=>{

                if(!document.getElementById("lightbox").classList.contains("open")) return;

                if(e.key==="ArrowRight") nextPhoto();

                if(e.key==="ArrowLeft") prevPhoto();

                if(e.key==="Escape") closeLightbox();

            });

            let touchStartX = 0;
            let touchEndX = 0;

            const lightbox = document.getElementById("lightbox");

            lightbox.addEventListener("touchstart", function(e){
                touchStartX = e.changedTouches[0].screenX;
            });

            lightbox.addEventListener("touchend", function(e){
                touchEndX = e.changedTouches[0].screenX;
                handleSwipe();
            });

            function handleSwipe(){
                const swipeDistance = touchEndX - touchStartX;

                if(Math.abs(swipeDistance) < 50){
                    return;
                }

                if(swipeDistance < 0){
                    nextPhoto();
                }else{
                    prevPhoto();
                }
            }

        </script>

    </body>
</html>
