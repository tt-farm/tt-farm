        <style>
            body{
                margin:0;
                font-family:"Yu Gothic","Hiragino Sans",sans-serif;
                background:#fffaf0;
                color:#333;
            }

            header{
                background:#f6d77a;
                color:#4e342e;
                text-align:center;
                padding:22px;
            }

            header h1{
                margin:0;
                font-size:42px;
            }
            
            .logo-tt{
                font-family:'Great Vibes',cursive;
                margin-right:10px;
            }

            .logo-ja{
                font-family:"Yu Gothic","Hiragino Sans",sans-serif;
                font-weight:bold;
            }

            header p{
                margin:8px 0 0;
                font-size:18px;
            }

            .menu-button{
                display:none;
                position:fixed;
                top:30px;
                left:15px;
                z-index:1001;
                background:#33691E;
                color:white;
                border:none;
                font-size:28px;
                padding:8px 14px;
                cursor:pointer;
                border-radius:6px;
            }

            nav{
                background:#33691E;
                display:flex;
                justify-content:center;
                flex-wrap:wrap;
            }

            nav a{
                color:white;
                text-decoration:none;
                padding:12px 20px;
                font-weight:bold;
                border-right:1px solid
                rgba(255,255,255,0.25);
            }
            nav a:hover{
                background:#558B2F;
            }

            @media(max-width:768px){

                .menu-button{
                    display:block;
                }

                nav{
                    position:fixed;
                    top:0;
                    left:-260px;
                    width:240px;
                    height:100vh;
                    background:#33691E;
                    display:flex;
                    flex-direction:column;
                    justify-content:flex-start;
                    padding-top:70px;
                    transition:0.3s;
                    z-index:1000;
                }
               
                nav.open{
                    left:0;
                }

                nav a{
                    border-right:none;
                    border-bottom:1px solid rgba(255,255,255,0.25);
                    text-align:left;
                    padding:16px 20px;
                }
            }
            main{
                max-width:1100px;
                margin:40px auto;
                padding:20px;
            }
        
            h2{
                color:#6d8f3f;
            }
        
            .section{
                background:white;
                padding:30px;
                margin-bottom:30px;
                border-radius:12px;
                box-shadow:0 4px 10px rgba(0,0,0,0.1);
            }

            .section h2{
                color:#6d8f3f;
            }

            .section ul{
                line-height:2;
            }

            footer{
                background:#6d8f3f;
                color:white;
                text-align:center;
                padding:20px;
            }

            @media(max-width:768px){
                header h1{
                    font-size:30px;
                }
                
                nav a{
                    width:100%;
                    text-align:center;
                    border-bottom:1px solid
                    rgba(255,255,255,0.2);
                }

                .hero{
                    height:360px;
                }

                .message{
                    margin:25px 15px;
                }

                .message h2{
                    font-size:26px;
                }
            }
